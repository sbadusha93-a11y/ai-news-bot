name: CoinDCX Pro Bot

on:
  push:
    branches: [main]
    paths:
      - 'coindcx-bot/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - deploy-vps
          - deploy-selfhosted
          - deploy-railway
  schedule:
    - cron: '0 */6 * * *'

jobs:
  check:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.mode == 'check' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coindcx-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: coindcx-bot/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "from src.config import bot_config; from src.exchange.coindcx import CoinDCXExchange; print('OK')"
      - name: Check config valid
        run: python -c "import json; c=json.load(open('config/config.json')); print(f'Mode={c[\"bot\"][\"mode\"]}, coins={c[\"coin_selection\"][\"max_coins_to_scan\"]}')"

  deploy-vps:
    if: ${{ github.event.inputs.mode == 'deploy-vps' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/coindcx-bot
            git pull origin main
            echo "COIN_DCX_API_KEY=${{ secrets.COIN_DCX_API_KEY }}" > .env
            echo "COIN_DCX_API_SECRET=${{ secrets.COIN_DCX_API_SECRET }}" >> .env
            echo "DASHBOARD_USERNAME=${{ secrets.DASHBOARD_USERNAME }}" >> .env
            echo "DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}" >> .env
            docker-compose up -d --build
      - name: Health check
        run: |
          sleep 10
          curl -sSf http://${{ secrets.VPS_HOST }}:8501/healthz 2>/dev/null && echo "Dashboard OK" || echo "Dashboard may still be starting"

  deploy-railway:
    if: ${{ github.event_name == 'push' || github.event.inputs.mode == 'deploy-railway' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service coindcx-bot
        working-directory: coindcx-bot
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-selfhosted:
    if: ${{ github.event.inputs.mode == 'deploy-selfhosted' }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: coindcx-bot
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Create .env from secrets
        run: |
          if [ -n "${{ secrets.COIN_DCX_API_KEY }}" ]; then
            echo "COIN_DCX_API_KEY=${{ secrets.COIN_DCX_API_KEY }}" > .env
            echo "COIN_DCX_API_SECRET=${{ secrets.COIN_DCX_API_SECRET }}" >> .env
            echo "DASHBOARD_USERNAME=${{ secrets.DASHBOARD_USERNAME }}" >> .env
            echo "DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}" >> .env
          fi
      - name: Start bot
        run: |
          $env:STREAMLIT_BROWSER_GATHER_USAGE_STATS="false"
          Start-Job -ScriptBlock {
            param($dir) Set-Location $dir
            "n" | py -3.13 -m streamlit run src/dashboard/app.py --server.port 8501 --server.headless true
          } -ArgumentList (Get-Location)
          Start-Sleep 5
          $p = Get-Process -Name "python" -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -match "streamlit" }
          if ($p) { echo "Bot started (PID: $($p.Id))" } else { echo "Bot may have failed to start" }
      - name: Keep-alive (360 min)
        run: |
          echo "Bot running. Press CTRL+C to stop."
          while ($true) {
            $proc = Get-Process -Name "python" -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -match "streamlit" }
            if (-not $proc) {
              echo "Bot process died. Re-starting..."
              break
            }
            Start-Sleep -Seconds 60
          }
        shell: pwsh
        timeout-minutes: 360
