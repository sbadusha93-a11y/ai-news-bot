name: Tech Content Bot

on:
  workflow_dispatch:
    inputs:
      format:
        description: 'Content format (random, tech_list, tech_facts)'
        required: true
        default: 'random'
        type: choice
        options:
          - random
          - tech_list
          - tech_facts
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tech-bot/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install -r tech-bot/requirements.txt

      - name: Create .env file
        run: |
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" > tech-bot/.env

      - name: Run Tech Content Bot
        run: python tech_bot.py --format ${{ github.event.inputs.format || 'random' }} --upload --privacy public
        working-directory: tech-bot
