name: Gaming News Bot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: gaming-bot/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install -r gaming-bot/requirements.txt

      - name: Create .env file
        run: |
          echo "NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}" > gaming-bot/.env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> gaming-bot/.env

      - name: Run Gaming News Bot
        run: python gaming_bot.py --privacy public
        working-directory: gaming-bot
