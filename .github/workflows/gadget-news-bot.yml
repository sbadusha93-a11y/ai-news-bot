name: Gadget News Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-news-bot/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          pip install -r ai-news-bot/requirements.txt

      - name: Restore YouTube token from cache
        id: token-cache
        uses: actions/cache@v4
        with:
          path: ai-news-bot/youtube_token.pickle
          key: youtube-token-${{ github.run_id }}
          restore-keys: |
            youtube-token-

      - name: Decode YouTube token from secret (first ever run fallback)
        if: steps.token-cache.outputs.cache-hit != 'true'
        env:
          TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
        run: |
          python -c "import base64,os; data=os.environ['TOKEN_B64']; open('ai-news-bot/youtube_token.pickle','wb').write(base64.b64decode(data))"

      - name: Decode client_secret.json
        env:
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_JSON }}
        run: |
          python -c "import os; open('ai-news-bot/client_secret.json','w').write(os.environ['CLIENT_SECRET'])"

      - name: Create .env file
        run: |
          echo "NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}" > ai-news-bot/.env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> ai-news-bot/.env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> ai-news-bot/.env

      - name: Run Gadget News Bot
        run: python ai_news_bot.py --upload --shorts --privacy public
        working-directory: ai-news-bot
